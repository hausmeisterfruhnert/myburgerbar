<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <title>myburger bar - drink creator</title>
</head>
<body>

<div class="container">
    <h1>myburger bar 🍹</h1>
    
    <!-- Optionale Tischauswahl für Bestellungen -->
    <div class="table-selector-box">
        <label for="activeTableSelect"><strong>Modus / Tischauswahl:</strong></label>
        <select id="activeTableSelect" onchange="toggleTableMode()" style="margin-top: 5px;">
            <option value="">-- Nur Rezept ansehen (Kein Tisch) --</option>
            <option value="Tisch 1">Bestellung für Tisch 1</option>
            <option value="Tisch 2">Bestellung für Tisch 2</option>
            <option value="Tisch 3">Bestellung für Tisch 3</option>
            <option value="Tisch 4">Bestellung für Tisch 4</option>
            <option value="Tisch 5">Bestellung für Tisch 5</option>
            <option value="Tisch 6">Bestellung für Tisch 6</option>
            <option value="Tisch 7">Bestellung für Tisch 7</option>
            <option value="Tisch 8">Bestellung für Tisch 8</option>
            <option value="Tisch 9">Bestellung für Tisch 9</option>
            <option value="Tisch 10">Bestellung für Tisch 10</option>
        </select>
    </div>

    <!-- Globaler Doppelshot Aufschlag -->
    <div class="global-surcharge-box">
        <label for="globalDoubleShotSurcharge">Aufschlag Doppel-Shot (€):</label>
        <input type="number" id="globalDoubleShotSurcharge" step="0.10" min="0" onchange="updateDoubleShotSurcharge()">
    </div>
    <!-- Kategorie-Filter Buttons -->
    <div class="filter-container">
        <button class="btn-filter active" onclick="filterCategory('all', this)">Alle</button>
        <button class="btn-filter" onclick="filterCategory('hausgemachtes', this)">Hausgemachtes</button>
        <button class="btn-filter" onclick="filterCategory('bier', this)">Bier</button>
        <button class="btn-filter" onclick="filterCategory('prickelndes', this)">Prickelndes</button>
        <button class="btn-filter" onclick="filterCategory('longdrinks', this)">Longdrinks</button>
        <button class="btn-filter" onclick="filterCategory('shots', this)">Shots</button>
    </div>
    
    <!-- Dropdown für die Getränkeauswahl -->
    <select id="cocktailSelect" onchange="showRecipe()">
        <option value="">-- Getränk wählen --</option>
    </select>

    <!-- Anzeige der Rezeptkarte mit Preisen -->
    <div id="recipeCard" class="recipe-card">
        <h3 id="cocktailTitle"></h3>
        
        <div class="price-badge">Preis: <span id="priceDisplay">0,00</span> €</div>

        <div id="doubleShotContainer" class="double-shot-box" style="display: none;">
            <label>
                <input type="checkbox" id="doubleShotCheckbox" onchange="toggleDoubleShot()"> 
                <strong>Doppel-Shot (Double) aktivieren</strong>
            </label>
        </div>

        <ul id="ingredientsList"></ul>
        
        <!-- Bestellbutton: Wird nur eingeblendet, wenn ein Tisch gewählt ist -->
        <button id="addToTableBtn" class="btn-add-to-table" onclick="addDrinkToTable()" style="display: none;">➔ Zum ausgewählten Tisch hinzufügen</button>
        
        <!-- Bearbeitungs-Modus -->
        <div id="editSection" style="display: none; margin-top: 15px; border-top: 1px dashed #555; padding-top: 10px;">
            <label for="editIngredients" style="font-size: 13px; color: #ff9f1c; display: block; margin-bottom: 3px;">Zutaten ändern (mit Komma trennen):</label>
            <input type="text" id="editIngredients" style="margin-bottom: 8px;">
            
            <label for="editPrice" style="font-size: 13px; color: #ff9f1c; display: block; margin-bottom: 3px;">Basispreis ändern (€):</label>
            <input type="number" id="editPrice" step="0.10" min="0" style="margin-bottom: 10px;">
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-save" onclick="updateRecipeIngredients()" style="background-color: #28a745; color: white; margin-top: 0; font-size: 13px;">Änderungen speichern</button>
                <button id="resetRecipeBtn" class="btn-delete" onclick="resetToDefault()" style="background-color: #6c757d; color: white; margin-top: 0; width: auto; font-size: 13px; padding: 5px 10px;">Zurücksetzen</button>
            </div>
        </div>
        
        <button id="deleteBtn" class="btn-delete" onclick="deleteCustom()">löschen</button>
    </div>

    <!-- Live-Tischübersicht -->
    <div class="orders-section">
        <h2>Aktuelle Tisch-Bestellungen 📋</h2>
        <div id="tablesContainer"></div>
    </div>

    <hr style="margin-top: 30px;">

    <!-- Formular für neue Rezepte -->
    <h2>eigenes rezept</h2>
    <input type="text" id="newName" placeholder="Name des Getränks">
    <input type="text" id="ing1" placeholder="Zutaten (mit Komma trennen)">
    <small>Tipp: "Zutat 1, Zutat 2, Zutat 3" eingeben</small>
    <button class="btn-save" onclick="saveCocktail()">speichern</button>
</div>

</body>
</html>

    if (currentRecipes && (!currentRecipes["jaegermeister"] || !currentRecipes["jaegermeister"].price)) {
        currentRecipes = null; 
        localStorage.removeItem("myBarCocktails");
    }
    
    if (!currentRecipes || Object.keys(currentRecipes).length < Object.keys(defaultMenu).length) {
        currentRecipes = { ...defaultMenu };
        localStorage.setItem("myBarCocktails", JSON.stringify(currentRecipes));
    }

    let doubleShotSurcharge = parseFloat(localStorage.getItem("myBarDoubleShotSurcharge")) || 2.50;
    document.getElementById("globalDoubleShotSurcharge").value = doubleShotSurcharge.toFixed(2);

    function updateDoubleShotSurcharge() {
        const input = document.getElementById("globalDoubleShotSurcharge");
        let val = parseFloat(input.value.replace(',', '.'));
        if (isNaN(val) || val < 0) val = 0;
        doubleShotSurcharge = val;
        localStorage.setItem("myBarDoubleShotSurcharge", doubleShotSurcharge);
        input.value = doubleShotSurcharge.toFixed(2);
        showRecipe();
    }

    function filterCategory(category, buttonElement) {
        currentFilter = category;
        const buttons = document.querySelectorAll(".btn-filter");
        buttons.forEach(btn => btn.classList.remove("active"));
        buttonElement.classList.add("active");
        
        updateDropdown();
        document.getElementById("recipeCard").style.display = "none";
    }

    function updateDropdown() {
        const select = document.getElementById("cocktailSelect");
        select.innerHTML = '<option value="">-- Getränk wählen --</option>';

        for (const key in currentRecipes) {
            const recipe = currentRecipes[key];
            const recipeCategory = recipe.category || "custom"; 

            if (currentFilter === "all" || currentFilter === recipeCategory) {
                const option = document.createElement("option");
                option.value = key; 
                const isChanged = !recipe.isdefault && !recipe.isDefault;
                option.textContent = recipe.title + (isChanged && !key.startsWith("custom-") ? " (Angepasst)" : "");
                select.appendChild(option);
            }
        }
        select.value = ""; 
    }

    function toggleTableMode() {
        const tableName = document.getElementById("activeTableSelect").value;
        const addToTableBtn = document.getElementById("addToTableBtn");
        
        if (tableName !== "" && document.getElementById("recipeCard").style.display === "block") {
            addToTableBtn.style.display = "block";
        } else {
            addToTableBtn.style.display = "none";
        }
    }

    function calculateCurrentPrice() {
        const selected = document.getElementById("cocktailSelect").value;
        if (!selected) return 0;
        
        const recipe = currentRecipes[selected];
        const doubleShotCheckbox = document.getElementById("doubleShotCheckbox");
        
        let price = parseFloat(recipe.price) || 0;
        if (doubleShotCheckbox && doubleShotCheckbox.checked && recipe.category === "shots") {
            price += doubleShotSurcharge;
        }
        return price;
    }

        const addToTableBtn = document.getElementById("addToTableBtn");
        
        if (tableName !== "" && document.getElementById("recipeCard").style.display === "block") {
            addToTableBtn.style.display = "block";
        } else {
            addToTableBtn.style.display = "none";
        }
    }

    function calculateCurrentPrice() {
        const selected = document.getElementById("cocktailSelect").value;
        if (!selected) return 0;
        
        const recipe = currentRecipes[selected];
        const doubleShotCheckbox = document.getElementById("doubleShotCheckbox");
        
        let price = parseFloat(recipe.price) || 0;
        if (doubleShotCheckbox && doubleShotCheckbox.checked && recipe.category === "shots") {
            price += doubleShotSurcharge;
        }
        return price;
    }

    function showRecipe() {
        const selected = document.getElementById("cocktailSelect").value;
        const card = document.getElementById("recipeCard");
        const editSection = document.getElementById("editSection");
        const editIngredientsInput = document.getElementById("editIngredients");
        const editPriceInput = document.getElementById("editPrice");
        const resetBtn = document.getElementById("resetRecipeBtn");
        const doubleShotContainer = document.getElementById("doubleShotContainer");
        
        if (!selected) { card.style.display = "none"; return; }
        
        const recipe = currentRecipes[selected];
        document.getElementById("cocktailTitle").innerText = recipe.title;
        document.getElementById("ingredientsList").innerHTML = recipe.ingredients.map(i => `<li>${i.trim()}</li>`).join("");
        
        if (recipe.category === "shots") {
            doubleShotContainer.style.display = "block";
        } else {
            doubleShotContainer.style.display = "none";
            document.getElementById("doubleShotCheckbox").checked = false;
        }
        
        let finalPrice = calculateCurrentPrice();
        document.getElementById("priceDisplay").innerText = finalPrice.toFixed(2).replace('.', ',');
        
        editIngredientsInput.value = recipe.ingredients.join(", ");
        editPriceInput.value = (parseFloat(recipe.price) || 0).toFixed(2);
        editSection.style.display = "block";
        
        const isCustomCreated = selected.startsWith("custom-");
        resetBtn.style.display = !isCustomCreated ? "block" : "none";
        document.getElementById("deleteBtn").style.display = isCustomCreated ? "block" : "none";
        card.style.display = "block";
        
        toggleTableMode();
    }

    function toggleDoubleShot() {
        showRecipe();
    }

    function addDrinkToTable() {
        const selected = document.getElementById("cocktailSelect").value;
        const tableName = document.getElementById("activeTableSelect").value;
        
        if (!selected || tableName === "") return;
        
        const recipe = currentRecipes[selected];
        const doubleShotCheckbox = document.getElementById("doubleShotCheckbox");
        const isDouble = (recipe.category === "shots" && doubleShotCheckbox.checked);
        const finalPrice = calculateCurrentPrice();
        
        const drinkName = recipe.title + (isDouble ? " (Doppel-Shot)" : "");
        
        if (!tableOrders[tableName]) {
            tableOrders[tableName] = [];
        }
        
        tableOrders[tableName].push({
            name: drinkName,
            price: finalPrice
        });
        
        localStorage.setItem("myBarTableOrders", JSON.stringify(tableOrders));
        renderTables();
    }
    function renderTables() {
        const container = document.getElementById("tablesContainer");
        container.innerHTML = "";
        
        let hasActiveOrders = false;
        
        for (const tableName in tableOrders) {
            const items = tableOrders[tableName];
            if (items.length === 0) continue;
            
            hasActiveOrders = true;
            const card = document.createElement("div");
            card.className = "table-card";
            
            let total = 0;
            let listHTML = "";
            
            items.forEach((item, index) => {
                total += item.price;
                listHTML += `<li>
                    ${item.name} - <strong>${item.price.toFixed(2).replace('.', ',')} €</strong>
                    <span style="color:#dc3545; cursor:pointer; margin-left:8px; font-weight:bold;" onclick="removeSingleDrink('${tableName}', ${index})">✕</span>
                </li>`;
            });
            
            card.innerHTML = `
                <h4>
                    <span>${tableName}</span>
                    <button class="btn-clear-table" onclick="clearTable('${tableName}')">Abrechnen / Leeren</button>
                </h4>
                <ul>${listHTML}</ul>
                <div style="text-align: right; font-size: 13px; font-weight: bold; margin-top: 5px; color: #ff9f1c;">
                    Gesamt: ${total.toFixed(2).replace('.', ',')} €
                </div>
            `;
            
            container.appendChild(card);
        }
        
        if (!hasActiveOrders) {
            container.innerHTML = "<p style='color: #888; font-size: 13px;'>Aktuell keine offenen Bestellungen an den Tischen.</p>";
        }
    }

    function removeSingleDrink(tableName, itemIndex) {
        if (tableOrders[tableName]) {
            tableOrders[tableName].splice(itemIndex, 1);
            if (tableOrders[tableName].length === 0) {
                delete tableOrders[tableName];
            }
            localStorage.setItem("myBarTableOrders", JSON.stringify(tableOrders));
            renderTables();
        }
    }

    function clearTable(tableName) {
        if (confirm(`${tableName} wirklich abrechnen und Bestellliste leeren?`)) {
            delete tableOrders[tableName];
            localStorage.setItem("myBarTableOrders", JSON.stringify(tableOrders));
            renderTables();
        }
    }

    function resetToDefault() {
        const selected = document.getElementById("cocktailSelect").value;
        if (!selected || selected.startsWith("custom-")) return;
        
        if (defaultMenu[selected]) {
            currentRecipes[selected] = { ...defaultMenu[selected] };
            localStorage.setItem("myBarCocktails", JSON.stringify(currentRecipes));
            document.getElementById("doubleShotCheckbox").checked = false;
            showRecipe();
            updateDropdown();
            alert("Erfolgreich zurückgesetzt!");
        }
    }

    function updateRecipeIngredients() {
        const selected = document.getElementById("cocktailSelect").value;
        const editIngredientsInput = document.getElementById("editIngredients");
        const editPriceInput = document.getElementById("editPrice");
        
        if (!selected) return;
        const rawInput = editIngredientsInput.value.trim();
        let newPrice = parseFloat(editPriceInput.value.replace(',', '.'));
        
        if (!rawInput) return;
        if (isNaN(newPrice) || newPrice < 0) newPrice = 0;
        
        currentRecipes[selected].ingredients = rawInput.split(",").map(item => item.trim()).filter(item => item !== "");
        currentRecipes[selected].price = newPrice;
        currentRecipes[selected].isdefault = false;
        currentRecipes[selected].isDefault = false;
        
        localStorage.setItem("myBarCocktails", JSON.stringify(currentRecipes));
        showRecipe();
        updateDropdown();
        alert("Änderungen gespeichert!");
    }

    function saveCocktail() {
        const nameInput = document.getElementById("newName");
        const ingInput = document.getElementById("ing1");
        if (!nameInput.value.trim() || !ingInput.value.trim()) return;
        
        const key = "custom-" + Date.now();
        currentRecipes[key] = { 
            title: nameInput.value.trim() + " (Eigen)", 
            category: "custom",
            price: 0.00, 
            ingredients: ingInput.value.trim().split(",").map(i => i.trim()), 
            isDefault: false 
        };
        
        localStorage.setItem("myBarCocktails", JSON.stringify(currentRecipes));
        nameInput.value = ""; ingInput.value = "";
        
        filterCategory("all", document.querySelector(".btn-filter"));
        document.getElementById("cocktailSelect").value = key;
        showRecipe();
    }

    function deleteCustom() {
        const selected = document.getElementById("cocktailSelect").value;
        if (!selected || !selected.startsWith("custom-")) return;
        delete currentRecipes[selected];
        localStorage.setItem("myBarCocktails", JSON.stringify(currentRecipes));
        updateDropdown();
        document.getElementById("recipeCard").style.display = "none";
    }

    updateDropdown();
    renderTables();
</script>
</body>
</html>
